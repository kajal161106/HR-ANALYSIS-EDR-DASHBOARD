<!DOCTYPE html>
<html>
<head>
<title>HR Analytics Dashboard</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box}
html, body {height:100%;overflow:hidden}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, 
        #1e3c72 0%, 
        #0c2d65 25%, 
        #0a2b64 26%, 
        #1e3a5f 50%, 
        #022c62 51%, 
        #030c52 75%, 
        #053267 100%);
    background-size: 400% 400%;
    animation: gradientFlow 15s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
}

@keyframes gradientFlow {
    0% { background-position: 0% 50%; }
    25% { background-position: 100% 50%; }
    50% { background-position: 100% 100%; }
    75% { background-position: 0% 100%; }
    100% { background-position: 0% 50%; }
}

.container {
    width: 95vw;
    height: 90vh;
    max-width: 1400px;
    display: flex;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 30px 100px rgba(0,0,0,0.4);
}

.left-panel {
    width: 58%;
    background: rgba(3, 32, 86, 0.9);
    backdrop-filter: blur(25px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 50px;
}

.logo-container {
    width: 130px;
    height: 130px;
    background: linear-gradient(135deg, #ff6b6b, #ff8e53);
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 35px;
    box-shadow: 0 20px 50px rgba(255,107,107,0.4);
    animation: floatPulse 3s ease-in-out infinite;
}

@keyframes floatPulse {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
}

.logo-container i { font-size: 3.2rem; color: white; }

.main-title {
    font-size: 3.2rem;
    background: linear-gradient(135deg, #ffffff, #e0e7ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 800;
    text-align: center;
    margin-bottom: 18px;
}

.tagline {
    font-size: 1.3rem;
    color: #e0e7ff;
    text-align: center;
    margin-bottom: 15px;
    font-weight: 600;
}

.edr-badge {
    background: linear-gradient(135deg, #ff6b6b, #ff8e53);
    color: white;
    padding: 10px 25px;
    border-radius: 40px;
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 8px 25px rgba(255,107,107,0.4);
    animation: pulseGlow 2s infinite;
    margin-bottom: 40px;
}

@keyframes pulseGlow {
    0% { box-shadow: 0 8px 25px rgba(255,107,107,0.4); }
    50% { box-shadow: 0 8px 35px rgba(255,107,107,0.6); }
    100% { box-shadow: 0 8px 25px rgba(255,107,107,0.4); }
}

.feature-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    max-width: 500px;
    width: 100%;
}

.feature-card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 25px 20px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    text-align: center;
    transition: all 0.4s ease;
}

.feature-card:hover {
    transform: translateY(-8px);
    background: rgba(255,255,255,0.25);
}

.feature-icon {
    font-size: 2.2rem;
    margin-bottom: 12px;
    display: block;
}

.feature-card:nth-child(1) .feature-icon { color: #ff6b6b; }
.feature-card:nth-child(2) .feature-icon { color: #4fc3f7; }
.feature-card:nth-child(3) .feature-icon { color: #81c784; }
.feature-card:nth-child(4) .feature-icon { color: #ffca28; }

.feature-text {
    font-size: 1rem;
    font-weight: 600;
    color: #ffffff;
}

.right-panel {
    width: 42%;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(30px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 50px;
    position: relative;
}

.form-title {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    text-align: center;
}

.form-subtitle {
    color: #4b5563;
    font-size: 1.1rem;
    text-align: center;
    margin-bottom: 40px;
    font-weight: 600;
}

.error-box {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    padding: 20px 25px;
    border-radius: 15px;
    border-left: 6px solid #b91c1c;
    margin-bottom: 30px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 10px 30px rgba(239,68,68,0.3);
    animation: shakeX 0.6s ease-in-out;
}

@keyframes shakeX {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
}

.form-group {
    margin-bottom: 30px;
    position: relative;
}

.form-label {
    display: block;
    margin-bottom: 10px;
    font-weight: 700;
    color: #1f2937;
    font-size: 1rem;
}

.form-input {
    width: 100%;
    padding: 22px 28px 22px 65px;
    border: 2px solid #e5e7eb;
    border-radius: 25px;
    font-size: 16px;
    transition: all 0.4s ease;
    background: linear-gradient(145deg, #ffffff, #f9fafb);
    font-weight: 500;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.form-input:focus {
    outline: none;
    border-color: #ff6b6b;
    box-shadow: 
        0 0 0 4px rgba(255,107,107,0.15),
        0 15px 40px rgba(255,107,107,0.2);
    background: white;
    transform: translateY(-2px);
}

.input-icon {
    position: absolute;
    left: 32px;
    top: 52px;
    font-size: 1.3rem;
    color: #9ca3af;
    transition: all 0.3s ease;
}

.form-input:focus + .input-icon {
    color: #ff6b6b;
    transform: scale(1.1);
}

.submit-btn {
    width: 100%;
    padding: 25px;
    background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
    color: white;
    border: none;
    border-radius: 28px;
    font-size: 1.3rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.5s ease;
    box-shadow: 0 15px 40px rgba(255,107,107,0.4);
    text-transform: uppercase;
    letter-spacing: 1.5px;
}

.submit-btn:hover {
    transform: translateY(-6px);
    box-shadow: 0 25px 60px rgba(255,107,107,0.6);
}

.submit-btn:active {
    transform: translateY(-3px);
}

@media (max-width: 1100px) {
    .container { 
        flex-direction: column; 
        width: 92vw;
        height: 88vh;
    }
    .left-panel, .right-panel { width: 100%; padding: 50px 40px; }
    .right-panel { border-radius: 0 0 20px 20px; }
    .left-panel { border-radius: 20px 20px 0 0; }
}

@media (max-width: 768px) {
    .main-title { font-size: 2.4rem; }
    .form-title { font-size: 1.9rem; }
    .feature-grid { grid-template-columns: 1fr; gap: 15px; }
    .left-panel, .right-panel { padding: 40px 25px; }
    .container { width: 95vw; height: 92vh; }
}
</style>
</head>
<body>
<div class="container">
    <div class="left-panel">
        <div class="logo-container">
            <i class="fas fa-chart-line"></i>
        </div>
        <h1 class="main-title">HR Analytics Dashboard</h1>
        <p class="tagline">Employee Data Repository & Advanced Analytics</p>
        
        <div class="feature-grid">
            <div class="feature-card">
                <i class="fas fa-users feature-icon"></i>
                <span class="feature-text">Employee Insights</span>
            </div>
            <div class="feature-card">
                <i class="fas fa-chart-pie feature-icon"></i>
                <span class="feature-text">Real-time Metrics</span>
            </div>
            <div class="feature-card">
                <i class="fas fa-database feature-icon"></i>
                <span class="feature-text">Live Data</span>
            </div>
            <div class="feature-card">
                <i class="fas fa-tachometer-alt feature-icon"></i>
                <span class="feature-text">Performance Tracking</span>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <h2 class="form-title">Analytics Portal</h2>
        <p class="form-subtitle">Secure access to HR intelligence</p>

        {% if error %}
        <div class="error-box">
            <i class="fas fa-exclamation-triangle"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" required 
                       placeholder="Enter your username" autocomplete="username">
                <i class="fas fa-user input-icon"></i>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" required 
                       placeholder="Enter your password" autocomplete="current-password">
                <i class="fas fa-lock input-icon"></i>
            </div>

            <button type="submit" class="submit-btn">
                Access Dashboard
            </button>
        </form>
    </div>
</div>
</body>
</html>
